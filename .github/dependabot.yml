version: 2
updates:
  # This is for the example directory, which is where the Maven project is located.
  - package-ecosystem: maven
    directory: "/example"
    schedule:
      interval: daily
      time: "23:30"
    open-pull-requests-limit: 10
    groups:
      spring:
        patterns:
          - "org.springframework:*"
          - "org.springframework.boot:*"
      testing:
        patterns:
          - "org.junit*:*"
          - "org.mockito:*"
          - "org.assertj:*"
          - "org.testcontainers:*"
          - "io.cucumber:*"
      logging:
        patterns:
          - "org.slf4j:*"
          - "ch.qos.logback:*"
      jackson:
        patterns:
          - "com.fasterxml.jackson*:*"
      apache:
        patterns:
          - "org.apache.*:*"
    commit-message:
      prefix: "build: "
    assignees:
      - paul58914080
    labels:
      - dependencies
      - automated
  # This is for the example directory, which is where the GitHub Actions workflows are located.
  - package-ecosystem: github-actions
    directory: "/example"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci: "
    assignees:
      - paul58914080
    labels:
      - ci
      - automated
  # This is for the root directory, which is where the GitHub Actions workflows are located.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci: "
    assignees:
      - paul58914080
    labels:
      - ci
      - automated
