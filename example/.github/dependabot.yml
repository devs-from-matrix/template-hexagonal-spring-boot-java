version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: daily
      time: "23:30"
    groups:
      spring:
        patterns:
          - "org.springframework:*"
          - "org.springframework.boot:*"
      testing:
        patterns:
          - "org.junit*:*"
          - "org.mockito:*"
          - "org.assertj:*"
          - "org.testcontainers:*"
          - "io.cucumber:*"
      logging:
        patterns:
          - "org.slf4j:*"
          - "ch.qos.logback:*"
      jackson:
        patterns:
          - "com.fasterxml.jackson*:*"
      apache:
        patterns:
          - "org.apache.*:*"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build: "
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci: "